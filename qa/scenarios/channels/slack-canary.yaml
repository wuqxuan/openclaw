title: Slack canary echo
scenario:
  id: slack-canary
  surface: channels
  coverage:
    primary: [channels.group-messages]
  execution:
    profiles: { "slack:default": 0 }
    kind: flow
    channel: slack
    timeoutMs: 45000
    retryCount: 1
    suiteIsolation: isolated
    config: { slackScenarioId: slack-canary }
flow:
  module: ./live-transports/slack/scenario-runtime.js
  call: runSlackCanaryScenario
  args: [{ expr: slackScenarioContext }]
