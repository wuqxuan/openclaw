title: Commitments heartbeat target none

scenario:
  id: commitments-heartbeat-target-none
  surface: memory
  coverage:
    primary:
      - commitments.heartbeat-target-none
    secondary:
      - commitments.scope
      - runtime.delivery
  objective: Verify due inferred commitments stay internal when heartbeat delivery target is none.
  successCriteria:
    - Scenario runs through qa-channel and a real gateway child.
    - A due commitment exists for the qa agent and qa-channel conversation.
    - A heartbeat wake runs after the commitment is due.
    - No commitment/check-in qa-channel outbound message is sent while heartbeat target is none.
    - The commitment remains pending and unattempted after the heartbeat.
  docsRefs:
    - docs/concepts/commitments.md
    - docs/gateway/heartbeat.md
    - docs/channels/qa-channel.md
  codeRefs:
    - src/infra/heartbeat-runner.ts
    - src/commitments/store.ts
    - extensions/qa-lab/src/qa-channel-transport.ts
  gatewayConfigPatch:
    commitments:
      enabled: true
      maxPerDay: 3
    agents:
      defaults:
        heartbeat:
          every: 30m
          target: none
  execution:
    kind: flow
    summary: Seed a due commitment, wake heartbeat, and assert target none sends no commitment message.
    config:
      conversationId: commitments-target-none-room
      commitmentId: cm_qa_target_none

flow:
  steps:
    - name: target none keeps due commitments internal
      actions:
        - call: waitForGatewayHealthy
          args:
            - ref: env
            - 60000
        - call: waitForQaChannelReady
          args:
            - ref: env
            - 60000
        - call: reset
        - set: beforeHeartbeatTs
          value:
            expr: "((await env.gateway.call('last-heartbeat', {}, { timeoutMs: liveTurnTimeoutMs(env, 15000) }))?.ts ?? 0)"
        - set: sessionKey
          value:
            expr: "`agent:qa:qa-channel:${config.conversationId}`"
        - set: stateDir
          value:
            expr: "path.join(env.gateway.tempRoot, 'state')"
        - set: sessionsPath
          value:
            expr: "path.join(stateDir, 'agents', 'qa', 'sessions', 'sessions.json')"
        - set: commitmentDatabasePath
          value:
            expr: "path.join(stateDir, 'state', 'openclaw.sqlite')"
        - set: sqlite
          value:
            expr: "await qaImport('node:sqlite')"
        - set: dueNow
          value:
            expr: "Date.now()"
        - call: fs.mkdir
          args:
            - expr: "path.dirname(sessionsPath)"
            - recursive: true
        - call: fs.writeFile
          args:
            - ref: sessionsPath
            - expr: "JSON.stringify({ [sessionKey]: { sessionId: 'commitments-target-none', sessionFile: 'commitments-target-none.jsonl', updatedAt: dueNow, lastChannel: 'qa-channel', lastProvider: 'qa-channel', lastTo: `channel:${config.conversationId}` } }, null, 2)"
            - utf8
        - set: commitmentRecord
          value:
            expr: "({ id: config.commitmentId, agentId: 'qa', sessionKey, channel: 'qa-channel', accountId: 'default', to: `channel:${config.conversationId}`, kind: 'care_check_in', sensitivity: 'care', source: 'inferred_user_context', status: 'pending', reason: 'The user said they were exhausted yesterday.', suggestedText: 'Did you sleep better?', dedupeKey: 'sleep-checkin:qa', confidence: 0.94, dueWindow: { earliestMs: dueNow - 60000, latestMs: dueNow + 3600000, timezone: 'UTC' }, createdAtMs: dueNow - 3600000, updatedAtMs: dueNow - 3600000, attempts: 0 })"
        - set: commitmentsSchemaReady
          value:
            expr: '(() => { let db; try { db = new sqlite.DatabaseSync(commitmentDatabasePath, { readOnly: true }); return db.prepare("SELECT 1 AS ready FROM sqlite_master WHERE type = ''table'' AND name = ''commitments''").get()?.ready === 1; } catch { return false; } finally { db?.close(); } })()'
        - assert:
            expr: commitmentsSchemaReady
            message: Gateway health completed without initializing the commitments SQLite schema
        - set: commitmentSeeded
          value:
            expr: "(() => { const db = new sqlite.DatabaseSync(commitmentDatabasePath); db.prepare('INSERT INTO commitments (id, agent_id, session_key, channel, account_id, recipient_id, thread_id, sender_id, kind, sensitivity, source, status, reason, suggested_text, dedupe_key, confidence, due_earliest_ms, due_latest_ms, due_timezone, source_message_id, source_run_id, created_at_ms, updated_at_ms, attempts, last_attempt_at_ms, sent_at_ms, dismissed_at_ms, snoozed_until_ms, expired_at_ms, record_json) VALUES (?, ?, ?, ?, ?, ?, NULL, NULL, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, NULL, NULL, ?, ?, ?, NULL, NULL, NULL, NULL, NULL, ?)').run(commitmentRecord.id, commitmentRecord.agentId, commitmentRecord.sessionKey, commitmentRecord.channel, commitmentRecord.accountId, commitmentRecord.to, commitmentRecord.kind, commitmentRecord.sensitivity, commitmentRecord.source, commitmentRecord.status, commitmentRecord.reason, commitmentRecord.suggestedText, commitmentRecord.dedupeKey, commitmentRecord.confidence, commitmentRecord.dueWindow.earliestMs, commitmentRecord.dueWindow.latestMs, commitmentRecord.dueWindow.timezone, commitmentRecord.createdAtMs, commitmentRecord.updatedAtMs, commitmentRecord.attempts, JSON.stringify(commitmentRecord)); db.close(); return true; })()"
        - set: messageCursor
          value:
            expr: state.getSnapshot().messages.length
        - call: env.gateway.call
          args:
            - wake
            - mode: now
              text: Commitments target none QA wake
              sessionKey:
                ref: sessionKey
              agentId: qa
            - timeoutMs: 30000
        - call: waitForCondition
          saveAs: heartbeat
          args:
            - lambda:
                async: true
                expr: "(async () => { const last = await env.gateway.call('last-heartbeat', {}, { timeoutMs: liveTurnTimeoutMs(env, 15000) }); return last && last.ts > beforeHeartbeatTs ? last : undefined; })()"
            - expr: liveTurnTimeoutMs(env, 45000)
            - 250
        - call: sleep
          args:
            - 3000
        - set: targetOutbound
          value:
            expr: "state.getSnapshot().messages.slice(messageCursor).filter((candidate) => candidate.direction === 'outbound' && candidate.conversation.id === config.conversationId)"
        - set: commitmentOutbound
          value:
            expr: "targetOutbound.filter((message) => normalizeLowercaseStringOrEmpty(message.text) !== 'heartbeat_ok')"
        - assert:
            expr: "commitmentOutbound.length === 0"
            message:
              expr: "`expected no qa-channel commitment messages for target none, saw ${JSON.stringify(commitmentOutbound.map((message) => ({ conversationId: message.conversation.id, text: message.text })))}; allTargetOutbound=${JSON.stringify(targetOutbound.map((message) => ({ conversationId: message.conversation.id, text: message.text })))}; recent=${recentOutboundSummary(state)}`"
        - set: commitment
          value:
            expr: "(() => { const db = new sqlite.DatabaseSync(commitmentDatabasePath, { readOnly: true }); const row = db.prepare('SELECT status, attempts FROM commitments WHERE id = ?').get(config.commitmentId); db.close(); return row; })()"
        - assert:
            expr: "commitment && commitment.status === 'pending' && commitment.attempts === 0"
            message:
              expr: "`commitment was attempted or changed: ${JSON.stringify(commitment)}`"
      detailsExpr: "`heartbeat=${JSON.stringify(heartbeat)}\\ncommitment=${JSON.stringify(commitment)}`"
